<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#dedad6" id="theme-meta" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Calc+" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <title>Calc+</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap');
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

    /* ── LIGHT ── */
    [data-theme="light"] {
      --bg:       #dedad6;
      --face:     #e6e2de;
      --face-hi:  #f0ede9;
      --face-lo:  #cac6c2;
      --sh-d:     #b0ada9;
      --sh-u:     rgba(255,255,255,0.85);
      --ink:      #1e1e1e;
      --ink-dim:  #9a9692;
      --ink-faint:#c8c4c0;
      --plus-bg1: #2c2c2c;
      --plus-bg2: #181818;
      --plus-sh:  #0a0a0a;
      --plus-ink: #ffffff;
      --eq-bg1:   #484848;
      --eq-bg2:   #282828;
      --eq-sh:    #0e0e0e;
      --eq-ink:   #ffffff;
      --num-g:    linear-gradient(160deg,#b0aca8 0%,#7a7672 40%,#4a4642 100%);
      --tape-col: #aaa6a2;
      /* toggle */
      --tog-track:#c8c4c0;
      --tog-ball: #e8e4e0;
      --tog-ball-sh: rgba(0,0,0,0.25);
      --tog-icon-l: "☀️";
      --tog-icon-r: "🌙";
    }

    /* ── DARK ── */
    [data-theme="dark"] {
      --bg:       #181818;
      --face:     #242424;
      --face-hi:  #2e2e2e;
      --face-lo:  #161616;
      --sh-d:     #080808;
      --sh-u:     rgba(255,255,255,0.05);
      --ink:      #e4e0dc;
      --ink-dim:  #686460;
      --ink-faint:#383432;
      --plus-bg1: #4a90e2;
      --plus-bg2: #2563b8;
      --plus-sh:  #1040a0;
      --plus-ink: #ffffff;
      --eq-bg1:   #505050;
      --eq-bg2:   #303030;
      --eq-sh:    #000000;
      --eq-ink:   #ffffff;
      --num-g:    linear-gradient(160deg,#dedad6 0%,#aaa6a2 40%,#6a6662 100%);
      --tape-col: #585450;
      /* toggle */
      --tog-track:#3a3a3a;
      --tog-ball: #e4e0dc;
      --tog-ball-sh: rgba(0,0,0,0.5);
      --tog-icon-l: "☀️";
      --tog-icon-r: "🌙";
    }

    html, body { height:100%; width:100%; overflow:hidden; background:var(--bg); transition:background 0.3s; }

    .phone {
      width:100vw; height:100vh; height:100dvh;
      background:var(--bg);
      display:grid;
      grid-template-rows:1fr auto;
      overflow:hidden;
      transition:background 0.3s;
    }

    /* ══════════════════════
       SLIDING TOGGLE
    ══════════════════════ */
    .toggle-wrap {
      position:absolute;
      top:16px; left:16px;
      z-index:10;
    }

    /* The pill track */
    .tog {
      width:64px; height:32px;
      border-radius:16px;
      background:var(--tog-track);
      cursor:pointer;
      position:relative;
      border:none;
      outline:none;
      padding:0;
      transition:background 0.3s;
      /* inset shadow for depth */
      box-shadow:inset 0 2px 5px rgba(0,0,0,0.28), inset 0 -1px 2px rgba(255,255,255,0.08);
    }

    /* Sun / moon icons on track */
    .tog::before {
      content:"☀️";
      position:absolute;
      left:7px; top:50%;
      transform:translateY(-50%);
      font-size:13px;
      line-height:1;
      pointer-events:none;
    }
    .tog::after {
      content:"🌙";
      position:absolute;
      right:7px; top:50%;
      transform:translateY(-50%);
      font-size:13px;
      line-height:1;
      pointer-events:none;
    }

    /* The sliding ball */
    .tog-ball {
      position:absolute;
      top:3px; left:3px;
      width:26px; height:26px;
      border-radius:50%;
      background:var(--tog-ball);
      box-shadow:0 2px 6px var(--tog-ball-sh), 0 1px 2px rgba(0,0,0,0.2);
      transition:transform 0.28s cubic-bezier(0.34,1.4,0.64,1), background 0.3s;
      pointer-events:none;
    }

    /* Dark = ball slides right */
    [data-theme="dark"] .tog-ball {
      transform:translateX(32px);
    }

    /* ── DISPLAY ── */
    .disp {
      display:flex; flex-direction:column;
      padding:0 24px 10px;
      overflow:hidden; min-height:0;
      position:relative;
    }

    /* Horizontal tape */
    .tape-wrap {
      flex:1;
      display:flex;
      align-items:flex-end;
      justify-content:flex-end;
      overflow:hidden;
      padding-top:60px;
      padding-bottom:6px;
    }
    .tape-row {
      display:flex; flex-direction:row;
      align-items:baseline; gap:4px;
      overflow:hidden; flex-wrap:nowrap; max-width:100%;
    }
    .tape-item {
      display:flex; align-items:baseline; gap:2px;
      opacity:0; transform:translateX(10px);
      animation:slideIn 0.2s ease forwards;
      flex-shrink:0;
    }
    @keyframes slideIn { to { opacity:1; transform:translateX(0); } }
    .t-num  { font-family:'Courier New',monospace; font-size:3.8vw; color:var(--tape-col); }
    .t-plus { font-family:'Courier New',monospace; font-size:3.4vw; color:var(--ink-faint); margin-left:1px; }

    /* Big number */
    .num-wrap {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      flex-shrink:0; padding:6px 0 4px; gap:2px;
    }
    .total-label {
      font-family:system-ui,sans-serif; font-size:2.8vw;
      color:var(--ink-faint); letter-spacing:0.14em; text-transform:uppercase;
    }
    .num {
      font-family:'Nunito',sans-serif; font-weight:900;
      line-height:1; letter-spacing:-0.02em;
      text-align:center; white-space:nowrap; user-select:none;
      background:var(--num-g);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      transition:font-size 0.12s ease;
    }
    .swipe-hint {
      font-family:system-ui,sans-serif; font-size:2.8vw;
      color:var(--ink-faint); text-align:center;
      opacity:0; transition:opacity 0.4s; margin-top:2px;
    }
    .swipe-hint.show { opacity:1; }

    @keyframes pop { 0%{transform:scale(0.85);opacity:0.2} 65%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
    .pop { animation:pop 0.22s cubic-bezier(0.34,1.56,0.64,1) both; }

    /* ── BUTTONS ── */
    .btn-area { padding:6px 12px 26px; display:flex; flex-direction:column; gap:7px; }
    .top-row  { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
    .mid-grid { display:grid; grid-template-columns:repeat(3,1fr) 1.55fr; gap:7px; }
    .bot-row  { display:grid; grid-template-columns:2fr 1fr; gap:7px; }

    .btn {
      border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
      outline:none; user-select:none; border-radius:16px;
      transition:box-shadow 70ms ease, transform 70ms ease, background 0.3s;
      touch-action:manipulation; font-family:system-ui,-apple-system,sans-serif;
      -webkit-user-select:none;
    }

    .bn { height:12.5vw; font-size:8vw; font-weight:500; color:var(--ink);
          background:linear-gradient(155deg,var(--face-hi) 0%,var(--face) 50%,var(--face-lo) 100%);
          box-shadow:0 5px 0 var(--sh-d),0 7px 14px rgba(0,0,0,.22),inset 0 1px 0 var(--sh-u); }
    .bn.down { transform:translateY(4px);
               background:linear-gradient(155deg,var(--face-lo) 0%,var(--face) 100%);
               box-shadow:0 1px 0 var(--sh-d),0 2px 4px rgba(0,0,0,.2),inset 0 2px 6px rgba(0,0,0,.2); }

    .bu { height:10vw; font-size:5vw; font-weight:500; color:var(--ink-dim);
          background:linear-gradient(155deg,var(--face-hi) 0%,var(--face) 50%,var(--face-lo) 100%);
          box-shadow:0 5px 0 var(--sh-d),0 7px 14px rgba(0,0,0,.2),inset 0 1px 0 var(--sh-u); }
    .bu.down { transform:translateY(4px);
               background:linear-gradient(155deg,var(--face-lo) 0%,var(--face) 100%);
               box-shadow:0 1px 0 var(--sh-d),0 2px 4px rgba(0,0,0,.15),inset 0 2px 5px rgba(0,0,0,.15); }

    .bp { font-size:14vw; font-weight:200; color:var(--plus-ink);
          grid-column:4; grid-row:1/span 3; border-radius:20px; height:100%;
          background:linear-gradient(160deg,var(--plus-bg1) 0%,var(--plus-bg2) 100%);
          box-shadow:0 6px 0 var(--plus-sh),0 9px 22px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.12);
          transition:box-shadow 70ms ease, transform 70ms ease, background 0.3s; }
    .bp.down { transform:translateY(5px);
               background:linear-gradient(160deg,var(--plus-bg2) 0%,var(--plus-bg1) 100%);
               box-shadow:0 1px 0 var(--plus-sh),0 2px 6px rgba(0,0,0,.4),inset 0 3px 10px rgba(0,0,0,.4); }

    .bz { height:12.5vw; font-size:8vw; font-weight:500; color:var(--ink);
          justify-content:flex-start; padding-left:7vw;
          background:linear-gradient(155deg,var(--face-hi) 0%,var(--face) 50%,var(--face-lo) 100%);
          box-shadow:0 5px 0 var(--sh-d),0 7px 14px rgba(0,0,0,.22),inset 0 1px 0 var(--sh-u); }
    .bz.down { transform:translateY(4px);
               background:linear-gradient(155deg,var(--face-lo) 0%,var(--face) 100%);
               box-shadow:0 1px 0 var(--sh-d),0 2px 4px rgba(0,0,0,.18),inset 0 2px 6px rgba(0,0,0,.15); }

    .be { height:12.5vw; font-size:7vw; font-weight:400; color:var(--eq-ink);
          letter-spacing:0.1em;
          background:linear-gradient(155deg,var(--eq-bg1) 0%,var(--eq-bg2) 100%);
          box-shadow:0 5px 0 var(--eq-sh),0 8px 18px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.1);
          transition:box-shadow 70ms ease, transform 70ms ease, background 0.3s; }
    .be.down { transform:translateY(4px);
               background:linear-gradient(155deg,var(--eq-bg2) 0%,var(--eq-bg1) 100%);
               box-shadow:0 1px 0 var(--eq-sh),0 2px 4px rgba(0,0,0,.32),inset 0 3px 8px rgba(0,0,0,.35); }
  </style>
</head>
<body>
<div class="phone">

  <div class="disp" id="disp">

    <!-- Sliding toggle -->
    <div class="toggle-wrap">
      <button class="tog" id="tog" aria-label="Toggle dark mode">
        <span class="tog-ball"></span>
      </button>
    </div>

    <!-- Horizontal tape -->
    <div class="tape-wrap">
      <div class="tape-row" id="tape-row"></div>
    </div>

    <!-- Big number -->
    <div class="num-wrap">
      <span class="total-label" id="label"></span>
      <span class="num" id="display" style="font-size:26vw">0</span>
      <span class="swipe-hint" id="hint">← swipe to delete</span>
    </div>
  </div>

  <div class="btn-area">
    <div class="top-row">
      <button class="btn bu" id="cBtn">C</button>
      <button class="btn bu" id="delBtn" style="font-size:6.5vw">&#8592;</button>
    </div>
    <div class="mid-grid">
      <button class="btn bn" data-d="7">7</button>
      <button class="btn bn" data-d="8">8</button>
      <button class="btn bn" data-d="9">9</button>
      <button class="btn bp" id="plusBtn" style="grid-column:4;grid-row:1/span 3">+</button>
      <button class="btn bn" data-d="4">4</button>
      <button class="btn bn" data-d="5">5</button>
      <button class="btn bn" data-d="6">6</button>
      <button class="btn bn" data-d="1">1</button>
      <button class="btn bn" data-d="2">2</button>
      <button class="btn bn" data-d="3">3</button>
    </div>
    <div class="bot-row">
      <button class="btn bz" id="zeroBtn">0</button>
      <button class="btn be" id="eqBtn">=</button>
    </div>
  </div>
</div>

<script>
(function(){
  var total=0, entry="", tape=[];

  /* ── Theme ── */
  var dark = localStorage.getItem("dark")==="1";
  function applyTheme(d){
    dark=d;
    document.documentElement.setAttribute("data-theme", d?"dark":"light");
    document.getElementById("theme-meta").content = d?"#181818":"#dedad6";
    localStorage.setItem("dark", d?"1":"0");
  }
  applyTheme(dark);
  document.getElementById("tog").addEventListener("click", function(){ applyTheme(!dark); });

  /* ── Audio ── */
  function beep(t){try{var c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);var f={num:400,plus:560,eq:640,c:220,del:320};o.type=t==="eq"?"triangle":"sine";o.frequency.value=f[t]||400;g.gain.setValueAtTime(0.06,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);o.start();o.stop(c.currentTime+0.1);}catch(e){}}
  function vibe(ms){try{navigator.vibrate&&navigator.vibrate(ms||8);}catch(e){}}

  function fmt(n){return parseFloat(n).toLocaleString("en-IN");}

  function render(){
    var val=entry!==""?entry:fmt(total);
    var dl=val.replace(/,/g,"").length;
    var fs=dl<=2?"26vw":dl<=4?"22vw":dl<=6?"17vw":dl<=8?"13vw":"9.5vw";
    var d=document.getElementById("display");
    d.textContent=val; d.style.fontSize=fs;
    document.getElementById("label").textContent=(entry===""&&tape.length>0)?"TOTAL":"";
    var tr=document.getElementById("tape-row"); tr.innerHTML="";
    tape.slice(-5).forEach(function(n){
      var item=document.createElement("span"); item.className="tape-item";
      var ns=document.createElement("span"); ns.className="t-num"; ns.textContent=fmt(n);
      var ps=document.createElement("span"); ps.className="t-plus"; ps.textContent="+";
      item.appendChild(ns); item.appendChild(ps); tr.appendChild(item);
    });
  }

  function pop(){var d=document.getElementById("display");d.classList.remove("pop");void d.offsetWidth;d.classList.add("pop");}

  function digit(d){beep("num");vibe(6);if(entry.length>=12)return;entry=entry==="0"?d:entry+d;render();}
  function plus(){beep("plus");vibe(10);if(entry!==""){total+=parseFloat(entry)||0;tape.push(entry);entry="";pop();}render();}
  function equals(){beep("eq");vibe(14);if(entry!==""){total+=parseFloat(entry)||0;tape.push(entry);entry="";pop();}render();}
  function del(){beep("del");vibe(8);if(entry!==""){entry=entry.length>1?entry.slice(0,-1):"";}else if(tape.length>0){var last=tape.pop();total-=parseFloat(last)||0;entry=last;pop();}else if(total!==0){entry=String(total);total=0;pop();}render();}

  /* ── Button press helpers ── */
  function dn(btn){btn.classList.add("down");}
  function up(btn){btn.classList.remove("down");}
  function wire(id, fn){
    var b=document.getElementById(id);
    b.addEventListener("pointerdown",function(e){e.preventDefault();dn(this);fn();});
    b.addEventListener("pointerup",   function(){up(this);});
    b.addEventListener("pointerleave",function(){up(this);});
    b.addEventListener("pointercancel",function(){up(this);});
  }

  wire("cBtn",   function(){beep("c");vibe(10);total=0;entry="";tape=[];pop();render();});
  wire("delBtn", del);
  wire("plusBtn",plus);
  wire("eqBtn",  equals);
  wire("zeroBtn",function(){digit("0");});

  document.querySelectorAll("[data-d]").forEach(function(btn){
    btn.addEventListener("pointerdown",function(e){e.preventDefault();dn(this);digit(this.dataset.d);});
    btn.addEventListener("pointerup",   function(){up(this);});
    btn.addEventListener("pointerleave",function(){up(this);});
    btn.addEventListener("pointercancel",function(){up(this);});
  });

  /* ── Swipe left on display = del ── */
  var sx=0,sy=0,hTimer=null;
  document.getElementById("disp").addEventListener("touchstart",function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  document.getElementById("disp").addEventListener("touchend",function(e){
    var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.5){
      del();
      var h=document.getElementById("hint"); h.classList.add("show");
      clearTimeout(hTimer); hTimer=setTimeout(function(){h.classList.remove("show");},1600);
    }
  },{passive:true});

  /* ── Keyboard ── */
  document.addEventListener("keydown",function(e){
    if(e.key>="0"&&e.key<="9")digit(e.key);
    else if(e.key==="+")plus();
    else if(e.key==="Enter"||e.key==="=")equals();
    else if(e.key==="Backspace")del();
    else if(e.key==="Escape"){total=0;entry="";tape=[];pop();render();}
  });

  if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(function(){});
  render();
})();
</script>
</body>
                                            </html>
